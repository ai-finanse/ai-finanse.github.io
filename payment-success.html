<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Płatność zakończona - AI Finanse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; padding: 48px; border-radius: 20px; text-align: center; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .icon { font-size: 72px; margin-bottom: 24px; }
        h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 16px; }
        p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
        .btn { display: inline-block; background: #0066FF; color: white; padding: 16px 32px; border-radius: 10px; text-decoration: none; font-weight: 600; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .session-id { font-size: 12px; color: #999; margin-top: 24px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Dziękujemy za płatność!</h1>
        <p>Twoja subskrypcja została aktywowana. Możesz teraz korzystać ze wszystkich funkcji AI Finanse.</p>
        <a href="https://t.me/AIFinanseBot" class="btn">Otwórz aplikację</a>
        <div class="session-id" id="sessionInfo"></div>
    </div>
    <script>
        // Получаем session_id из URL
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session');
        if (sessionId) {
            document.getElementById('sessionInfo').textContent = 'Session: ' + sessionId.substring(0, 20) + '...';
        }
    </script>
</body>
</html>
